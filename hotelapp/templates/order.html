{% include 'header.html' %}
{% load static %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Success</title>
    <style>
        body {
            background: linear-gradient(135deg, #fff5f0, #ffe0cc);
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding-top: 0px;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h1 {
            color: #2ecc71;
            font-size: 38px;
            margin-bottom: 15px;
            animation: pop 0.6s ease-in-out;
        }

        @keyframes pop {
            0% {transform: scale(0.7);}
            100% {transform: scale(1);}
        }

        p {
            color: #333;
            font-size: 18px;
            margin-bottom: 25px;
        }

        .points {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .point {
            background-color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 16px;
            color: #444;
            transition: transform 0.3s;
        }

        .point:hover {
            transform: scale(1.1);
        }

        a.btn {
            display: inline-block;
            margin-top: 30px;
            background-color: #ff7043;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        a.btn:hover {
            background-color: #ff5722;
        }
    </style>
</head>
<body>


<br>
<h1>!! Your Order is Successful !!</h1><br>
<p>Thank you for ordering with us </p><br>

<div class="points">
    <div class="point"> Freshly prepared food</div>
    <div class="point"> Fast & safe delivery</div>
    <div class="point"> Secure payment</div>
    <div class="point"> 24/7 customer support</div>
</div><br>

<a href="{% url 'menu' %}" class="btn">Back to Menu</a><br><br>
<a href="{% url 'home' %}" class="btn"> Back to Home</a>

</body>
</html>
