
{% load static %}
{% include 'header.html' %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
body{
    background: linear-gradient(135deg,#fff5f0,#ffe0cc);
    font-family: Arial, sans-serif;
}

.image{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    padding: 40px;
    justify-items: center;
}

.photo{
    width:300px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.photo:hover{
    transform:translateY(-8px);
}

.photo img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:15px;
}

.photo h3{
    color:#c62828;
    font-size:28px;
    margin-bottom:10px;
}

.photo p{
    color:#555;
    font-size:18px;
    line-height:1.5;
}

.price{
    color:#ff5722;
    font-size:24px;
    font-weight:bold;
}

.btn{
    display:inline-block;
    width:100%;
    padding:12px;
    background:#e4002b;
    color:white;
    text-align:center;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
}

.btn:hover{
    background:#b00020;
}
        @media(max-width:992px){
    .image{
        grid-template-columns: repeat(2,1fr);
    }
}

@media(max-width:600px){
    .image{
        grid-template-columns: 1fr;
    }
}
 </style>
</head>
<body>

<div class="image">
    {% for menu in menus %}
    <div class="photo">

        <img src="{{ menu.image.url }}" alt="{{ menu.name }}">

        <div class="content">
            <h3>{{ menu.name }}</h3>

            <p>{{ menu.description }}</p>

            <p class="price">₹{{ menu.price }}</p>

            <a href="{% url 'order' %}" class="btn">Add Cart</a>
        </div>

    </div>
    {% endfor %}
</div>


</body>
</html>
